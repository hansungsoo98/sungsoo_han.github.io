name: Prettier code formatter

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  check:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install Prettier
        run: npm install --save-dev --save-exact prettier @shopify/prettier-plugin-liquid

      - name: Find changed files
        id: changed
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --name-only -z --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          elif [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            git ls-files -z > changed-files.txt
          else
            git diff --name-only -z --diff-filter=ACMR "$BEFORE_SHA" "$HEAD_SHA" > changed-files.txt
          fi

          if [[ -s changed-files.txt ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            tr '\0' '\n' < changed-files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed files to check."
          fi

      - name: Prettier Check
        id: prettier
        if: ${{ steps.changed.outputs.has_files == 'true' }}
        run: xargs -0 npx prettier --check --ignore-unknown < changed-files.txt

      - name: Create diff
        # https://docs.github.com/en/actions/learn-github-actions/expressions#failure
        if: ${{ failure() && steps.changed.outputs.has_files == 'true' }}
        run: |
          xargs -0 npx prettier --write --ignore-unknown < changed-files.txt
          git diff -- . ':(exclude)package-lock.json' ':(exclude)package.json' > diff.txt
          npm install -g diff2html-cli
          diff2html -i file -s side -F diff.html -- diff.txt

      - name: Upload html diff
        id: artifact-upload
        if: ${{ failure() && steps.prettier.conclusion == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: HTML Diff
          path: diff.html
          retention-days: 7

      - name: Dispatch information to repository
        if: ${{ failure() && steps.prettier.conclusion == 'failure' && github.event_name == 'pull_request' }}
        uses: peter-evans/repository-dispatch@v2
        with:
          event-type: prettier-failed-on-pr
          client-payload: '{"pr_number": "${{ github.event.number }}", "artifact_url": "${{ steps.artifact-upload.outputs.artifact-url }}", "run_id": "${{ github.run_id }}"}'
